<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬ゲーム</title>

<style>

body{
margin:0;
background:#2b8a3e;
font-family:sans-serif;
color:white;
text-align:center;
}

#ui{
margin-top:20px;
}

.track{
position:absolute;
top:260px;
left:50px;
width:90%;
height:200px;
background:#b8860b;
border-radius:100px;
}

.goal{
position:absolute;
right:20px;
top:240px;
width:10px;
height:260px;
background:white;
}

.horse{
position:absolute;
width:60px;
height:30px;
border-radius:10px;
}

#horse0{background:red;top:280px;}
#horse1{background:blue;top:320px;}
#horse2{background:yellow;top:360px;}
#horse3{background:white;top:400px;}

button,input,select{
font-size:18px;
margin:5px;
}

</style>
</head>

<body>

<div id="ui">

💰 所持金: <span id="money">1000</span>

<br><br>

🐎 自分の馬  
スピード: <span id="speedStat">5</span>  
スタミナ: <span id="staminaStat">5</span>

<br>

<button onclick="trainSpeed()">スピード育成 (100円)</button>
<button onclick="trainStamina()">スタミナ育成 (100円)</button>

<br><br>

賭ける馬
<select id="betHorse"></select>

賭け金
<input id="betMoney" type="number" value="100">

<button id="start">レース開始</button>

<div id="odds"></div>
<div id="result"></div>

</div>

<div class="track"></div>
<div class="goal"></div>

<div id="horse0" class="horse"></div>
<div id="horse1" class="horse"></div>
<div id="horse2" class="horse"></div>
<div id="horse3" class="horse"></div>

<script>

let money=1000

let horses=[
{el:document.getElementById("horse0"),pos:0,speed:0,stamina:5,odds:1},
{el:document.getElementById("horse1"),pos:0,speed:0,stamina:5,odds:1},
{el:document.getElementById("horse2"),pos:0,speed:0,stamina:5,odds:1},
{el:document.getElementById("horse3"),pos:0,speed:0,stamina:5,odds:1}
]

let playerHorse=0

let speedStat=5
let staminaStat=5

function updateMoney(){
document.getElementById("money").textContent=money
}

function updateStats(){
document.getElementById("speedStat").textContent=speedStat
document.getElementById("staminaStat").textContent=staminaStat
}

function trainSpeed(){

if(money>=100){
money-=100
speedStat++
updateMoney()
updateStats()
}

}

function trainStamina(){

if(money>=100){
money-=100
staminaStat++
updateMoney()
updateStats()
}

}

function setupRace(){

horses.forEach((h,i)=>{

h.pos=0

if(i===playerHorse){

h.speed=1+speedStat*0.2
h.stamina=staminaStat

}else{

h.speed=1+Math.random()*2
h.stamina=5+Math.random()*10

}

h.odds=(2+Math.random()*5).toFixed(1)

})

updateOdds()

}

function updateOdds(){

let oddsHTML="📊 オッズ<br>"

horses.forEach((h,i)=>{
oddsHTML+=(i+1)+"番 : "+h.odds+"倍<br>"
})

document.getElementById("odds").innerHTML=oddsHTML

let select=document.getElementById("betHorse")

select.innerHTML=""

horses.forEach((h,i)=>{

let op=document.createElement("option")
op.value=i
op.textContent=(i+1)+"番"

select.appendChild(op)

})

}

document.getElementById("start").onclick=()=>{

setupRace()

let betHorse=parseInt(document.getElementById("betHorse").value)
let bet=parseInt(document.getElementById("betMoney").value)

if(bet>money){
alert("お金が足りない")
return
}

money-=bet
updateMoney()

let finish=false

function race(){

horses.forEach((h,i)=>{

let fatigue=Math.max(0.3,1-(h.pos/800)/h.stamina)

h.pos+=h.speed*fatigue

h.el.style.left=h.pos+"px"

if(h.pos>window.innerWidth-120 && !finish){

finish=true

if(i===betHorse){

let win=Math.floor(bet*h.odds)

money+=win

document.getElementById("result").textContent=
"🎉 的中！ "+win+"円"

}else{

document.getElementById("result").textContent=
"ハズレ！ 勝ったのは "+(i+1)+"番"

}

updateMoney()

}

})

if(!finish){
requestAnimationFrame(race)
}

}

race()

}

updateStats()
setupRace()

</script>

</body>
</html>
