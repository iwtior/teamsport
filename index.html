<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>3D Baseball Batting</title>

<style>
body{
margin:0;
background:black;
color:white;
font-family:sans-serif;
text-align:center;
overflow:hidden;
}

#ui{
position:absolute;
top:10px;
left:50%;
transform:translateX(-50%);
font-size:20px;
}

#cursor{
position:absolute;
width:80px;
height:80px;
border:3px solid yellow;
border-radius:50%;
pointer-events:none;
transform:translate(-40px,-40px);
}

canvas{
display:block;
}
</style>
</head>

<body>

<div id="ui">
⚾ Pitch: <span id="type">-</span>  
📊 Hits: <span id="hits">0</span> / <span id="atbat">0</span>  
AVG: <span id="avg">0.000</span>
</div>

<div id="cursor"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>

let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(60,innerWidth/innerHeight,0.1,1000);
let renderer = new THREE.WebGLRenderer({antialias:true});

renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

camera.position.set(0,2,8);

let light = new THREE.DirectionalLight(0xffffff,1);
light.position.set(5,10,5);
scene.add(light);

let ambient = new THREE.AmbientLight(0xffffff,0.6);
scene.add(ambient);

let ground = new THREE.Mesh(
new THREE.PlaneGeometry(50,50),
new THREE.MeshPhongMaterial({color:0x1a7a1a})
);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

let stand = new THREE.Mesh(
new THREE.BoxGeometry(50,10,5),
new THREE.MeshPhongMaterial({color:0x444444})
);
stand.position.set(0,5,-20);
scene.add(stand);

let batter = new THREE.Group();

let body = new THREE.Mesh(
new THREE.BoxGeometry(1,2,0.5),
new THREE.MeshPhongMaterial({color:0xffffff})
);
body.position.y=1;

let head = new THREE.Mesh(
new THREE.SphereGeometry(0.4,32,32),
new THREE.MeshPhongMaterial({color:0xffcc99})
);
head.position.y=2.4;

let bat = new THREE.Mesh(
new THREE.CylinderGeometry(0.1,0.1,3),
new THREE.MeshPhongMaterial({color:0x8b4513})
);
bat.rotation.z = Math.PI/4;
bat.position.set(1,1.2,0);

batter.add(body);
batter.add(head);
batter.add(bat);

batter.position.set(0,0,2);
scene.add(batter);

let ballGeo = new THREE.SphereGeometry(0.2,32,32);
let ballMat = new THREE.MeshPhongMaterial({color:"white"});
let ball = new THREE.Mesh(ballGeo,ballMat);

scene.add(ball);

let pitchType="";
let speed=0;
let curve=0;
let fork=0;

let hits=0;
let atbat=0;

function updateStats(){

document.getElementById("hits").textContent=hits;
document.getElementById("atbat").textContent=atbat;

let avg=atbat?hits/atbat:0;

document.getElementById("avg").textContent=avg.toFixed(3);

}

function pitch(){

ball.position.set(0,1,-15);

let r=Math.random();

if(r<0.33){

pitchType="ストレート";
speed=0.5;
curve=0;
fork=0;

}else if(r<0.66){

pitchType="カーブ";
speed=0.45;
curve=0.02;
fork=0;

}else{

pitchType="フォーク";
speed=0.45;
curve=0;
fork=0.02;

}

document.getElementById("type").textContent=pitchType;

}

pitch();

let cursorX=0;
let cursorY=0;

document.addEventListener("mousemove",e=>{

cursorX=(e.clientX/innerWidth)*6-3;
cursorY=(e.clientY/innerHeight)*3;

document.getElementById("cursor").style.left=e.clientX+"px";
document.getElementById("cursor").style.top=e.clientY+"px";

});

document.addEventListener("click",swing);

function swing(){

atbat++;

let dx=ball.position.x-cursorX;
let dy=ball.position.y-cursorY;

let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<0.7){

hits++;

ball.userData.hit=true;

ball.userData.vx=(Math.random()-0.5)*0.5;
ball.userData.vy=0.3+Math.random()*0.3;
ball.userData.vz=0.8;

}else{

ball.userData.hit=false;

}

updateStats();

}

function animate(){

requestAnimationFrame(animate);

if(!ball.userData.hit){

ball.position.z+=speed;
ball.position.x+=curve;
ball.position.y-=fork;

}else{

ball.position.x+=ball.userData.vx;
ball.position.y+=ball.userData.vy;
ball.position.z+=ball.userData.vz;

ball.rotation.x+=0.3;
ball.rotation.y+=0.3;

}

if(ball.position.z>3){

pitch();

}

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
