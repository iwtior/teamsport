<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬ゲーム</title>

<style>

body{
margin:0;
background:#0a5c2b;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:#1c7c3a;
display:block;
margin:auto;
border:4px solid white;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
padding:12px;
border-radius:10px;
width:260px;
text-align:left;
}

select,input,button{
width:100%;
margin-top:6px;
padding:6px;
}

</style>
</head>

<body>

<div id="ui">

<div>💰所持金: <span id="money">1000</span></div>

<hr>

🐎賭ける馬
<select id="betHorse"></select>

💰賭け金
<input id="betMoney" type="number" value="100">

<div id="odds"></div>

<button onclick="startRace()">レース開始</button>

</div>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let money=1000
let horses=[]
let race=false

const colors=["red","blue","yellow","purple","orange","cyan"]
const traits=["逃げ","先行","差し","追込"]

function createHorses(){

horses=[]

for(let i=0;i<6;i++){

let speed=3+Math.random()*1.5
let stamina=3+Math.random()*3
let trait=traits[Math.floor(Math.random()*traits.length)]

horses.push({

baseSpeed:speed,
stamina:stamina,
trait:trait,
progress:0,
color:colors[i],
odd:1

})

}

setupBetUI()

}

function setupBetUI(){

let select=document.getElementById("betHorse")
select.innerHTML=""

let oddsHTML=""

horses.forEach((h,i)=>{

let odd=(20/(h.baseSpeed+h.stamina)).toFixed(2)
h.odd=odd

let option=document.createElement("option")
option.value=i
option.text="馬"+(i+1)+" ("+h.color+")"

select.appendChild(option)

oddsHTML+=`<div>
馬${i+1} (${h.color})  
特性:${h.trait}  
スタミナ:${h.stamina.toFixed(1)}  
オッズ:${odd}倍
</div>`

})

document.getElementById("odds").innerHTML=oddsHTML

}

function startRace(){

let betMoney=parseInt(document.getElementById("betMoney").value)

if(betMoney>money){

alert("お金が足りません")
return

}

race=true

}

function finishRace(winnerIndex){

race=false

let betHorse=parseInt(document.getElementById("betHorse").value)
let betMoney=parseInt(document.getElementById("betMoney").value)

money-=betMoney

if(betHorse===winnerIndex){

let win=Math.floor(betMoney*horses[winnerIndex].odd)

money+=win

alert("🎉的中！ "+win+"円")

}else{

alert("残念ハズレ")

}

document.getElementById("money").innerText=money

createHorses()

}

function getSpeed(h){

let p=h.progress
let speed=h.baseSpeed

// 特性による動き
if(h.trait==="逃げ"){
if(p>0.6)speed*=0.7
}

if(h.trait==="先行"){
speed*=1
}

if(h.trait==="差し"){
if(p>0.6)speed*=1.4
}

if(h.trait==="追込"){
if(p>0.75)speed*=1.8
}

// スタミナ影響
if(p>0.7){
speed*=h.stamina/5
}

return speed

}

function update(){

if(!race)return

horses.forEach((h,i)=>{

let speed=(getSpeed(h)*0.0003)+(Math.random()*0.00015)

h.progress+=speed

if(h.progress>=1){

finishRace(i)

}

})

}

function drawTrack(){

ctx.lineWidth=50
ctx.strokeStyle="#8B4513"

ctx.beginPath()
ctx.ellipse(450,250,320,160,0,0,Math.PI*2)
ctx.stroke()

ctx.lineWidth=3
ctx.strokeStyle="white"

ctx.beginPath()
ctx.ellipse(450,250,320,160,0,0,Math.PI*2)
ctx.stroke()

}

function drawHorse(x,y,color){

ctx.fillStyle=color

ctx.fillRect(x-10,y-6,20,12)
ctx.fillRect(x+10,y-4,8,8)

ctx.fillRect(x-8,y+6,3,8)
ctx.fillRect(x,y+6,3,8)
ctx.fillRect(x+6,y+6,3,8)

}

function draw(){

ctx.clearRect(0,0,900,500)

drawTrack()

horses.forEach((h,i)=>{

let angle=h.progress*2*Math.PI

let x=450+Math.cos(angle)*320
let y=250+Math.sin(angle)*160

drawHorse(x,y,h.color)

ctx.fillStyle="white"
ctx.fillText(i+1,x-4,y-12)

})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

createHorses()
loop()

</script>

</body>
</html>
