<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬ゲーム</title>

<style>
body{
margin:0;
background:#2b8a3e;
font-family:sans-serif;
color:white;
text-align:center;
}

.track{
position:absolute;
top:260px;
left:50px;
width:90%;
height:200px;
background:#b8860b;
border-radius:100px;
}

.goal{
position:absolute;
right:20px;
top:240px;
width:10px;
height:260px;
background:white;
}

.horse{
position:absolute;
width:60px;
height:30px;
border-radius:10px;
}

#horse0{background:red;top:280px;}
#horse1{background:blue;top:320px;}
#horse2{background:yellow;top:360px;}
#horse3{background:white;top:400px;}

button,input,select{
font-size:18px;
}

#ui{
margin-top:20px;
}
</style>
</head>

<body>

<div id="ui">

💰 所持金: <span id="money">1000</span>

<br><br>

賭ける馬:
<select id="betHorse">
<option value="0">1番</option>
<option value="1">2番</option>
<option value="2">3番</option>
<option value="3">4番</option>
</select>

賭け金:
<input id="betMoney" type="number" value="100">

<button id="start">レース開始</button>

<div id="result"></div>

</div>

<div class="track"></div>
<div class="goal"></div>

<div id="horse0" class="horse"></div>
<div id="horse1" class="horse"></div>
<div id="horse2" class="horse"></div>
<div id="horse3" class="horse"></div>

<script>

let money=1000

let horses=[
{el:document.getElementById("horse0"),pos:0,speed:0},
{el:document.getElementById("horse1"),pos:0,speed:0},
{el:document.getElementById("horse2"),pos:0,speed:0},
{el:document.getElementById("horse3"),pos:0,speed:0}
]

document.getElementById("start").onclick=()=>{

let betHorse=parseInt(document.getElementById("betHorse").value)
let bet=parseInt(document.getElementById("betMoney").value)

if(bet>money){
alert("お金が足りない")
return
}

money-=bet
document.getElementById("money").textContent=money

horses.forEach(h=>{
h.pos=0
h.speed=Math.random()*2+1
})

let finish=false

function race(){

horses.forEach((h,i)=>{

h.pos+=h.speed
h.el.style.left=h.pos+"px"

if(h.pos>window.innerWidth-120 && !finish){

finish=true

if(i===betHorse){

let win=bet*3
money+=win

document.getElementById("result").textContent=
"🎉的中！ "+win+"円"

}else{

document.getElementById("result").textContent=
"ハズレ！ 勝ったのは "+(i+1)+"番"

}

document.getElementById("money").textContent=money

}

})

if(!finish){
requestAnimationFrame(race)
}

}

race()

}

</script>

</body>
</html>
