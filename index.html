<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬ゲーム</title>

<style>

body{
margin:0;
background:#0a5c2b;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:#1c7c3a;
display:block;
margin:auto;
border:4px solid white;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
padding:12px;
border-radius:10px;
text-align:left;
width:220px;
}

button{
padding:8px 14px;
margin-top:6px;
font-size:16px;
cursor:pointer;
}

select,input{
width:100%;
margin-top:5px;
}

</style>
</head>

<body>

<div id="ui">

<div>💰所持金: <span id="money">1000</span></div>

<hr>

🐎賭ける馬
<select id="betHorse"></select>

💰賭け金
<input id="betMoney" type="number" value="100">

<div id="odds"></div>

<button onclick="startRace()">レース開始</button>

<hr>

<div>
自分の馬<br>
Speed <span id="speed">5</span><br>
Stamina <span id="stamina">5</span>
</div>

<button onclick="train()">育成 (100)</button>

</div>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let money=1000

let playerHorse={
speed:5,
stamina:5
}

let horses=[]

let race=false

function createHorses(){

horses=[]

for(let i=0;i<5;i++){

horses.push({

speed:4+Math.random()*2,
stamina:4+Math.random()*2,
progress:0,
lap:0,
color:"hsl("+Math.random()*360+",70%,50%)",
player:false

})

}

horses.push({

speed:playerHorse.speed,
stamina:playerHorse.stamina,
progress:0,
lap:0,
color:"gold",
player:true

})

}

function updateUI(){

document.getElementById("money").innerText=money
document.getElementById("speed").innerText=playerHorse.speed.toFixed(1)
document.getElementById("stamina").innerText=playerHorse.stamina.toFixed(1)

}

function train(){

if(money>=100){

money-=100
playerHorse.speed+=0.3
playerHorse.stamina+=0.3

}

updateUI()

}

function generateOdds(){

let html=""
let select=document.getElementById("betHorse")

select.innerHTML=""

horses.forEach((h,i)=>{

let odd=(10/(h.speed+h.stamina)).toFixed(2)

html+=`<div>馬${i+1} (${h.color}) : ${odd}倍</div>`

let option=document.createElement("option")
option.value=i
option.text="馬"+(i+1)

select.appendChild(option)

h.odd=odd

})

document.getElementById("odds").innerHTML=html

}

function startRace(){

createHorses()

generateOdds()

race=true

}

function drawTrack(){

let cx=450
let cy=250

ctx.lineWidth=50
ctx.strokeStyle="#8B4513"

ctx.beginPath()
ctx.ellipse(cx,cy,320,160,0,0,Math.PI*2)
ctx.stroke()

ctx.lineWidth=3
ctx.strokeStyle="white"

ctx.beginPath()
ctx.ellipse(cx,cy,320,160,0,0,Math.PI*2)
ctx.stroke()

}

function drawHorse(x,y,color){

ctx.fillStyle=color

ctx.fillRect(x-12,y-6,24,12)
ctx.fillRect(x+12,y-4,8,8)

ctx.fillRect(x-10,y+6,3,8)
ctx.fillRect(x-2,y+6,3,8)
ctx.fillRect(x+6,y+6,3,8)

}

function update(){

if(!race)return

horses.forEach(h=>{

let speed=(h.speed*0.0008)+(Math.random()*0.0006)

h.progress+=speed

if(h.progress>=1){

h.progress=0
h.lap++

if(h.lap>=3){

race=false
finishRace(h)

}

}

})

}

function finishRace(winner){

let betHorse=parseInt(document.getElementById("betHorse").value)
let betMoney=parseInt(document.getElementById("betMoney").value)

if(betHorse===horses.indexOf(winner)){

money+=Math.floor(betMoney*winner.odd)

alert("的中！ "+Math.floor(betMoney*winner.odd)+"円")

}else{

money-=betMoney

alert("ハズレ")

}

horses.forEach(h=>{

if(!h.player){

h.speed+=Math.random()*0.2
h.stamina+=Math.random()*0.2

}

})

updateUI()

}

function draw(){

ctx.clearRect(0,0,900,500)

drawTrack()

let cx=450
let cy=250

horses.forEach((h,i)=>{

let angle=h.progress*2*Math.PI

let x=cx+Math.cos(angle)*320
let y=cy+Math.sin(angle)*160

drawHorse(x,y,h.color)

ctx.fillStyle="white"
ctx.fillText(i+1,x-3,y-12)

})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

updateUI()

loop()

</script>

</body>
</html>
