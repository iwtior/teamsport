<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>リアル競馬ゲーム</title>

<style>

body{
margin:0;
background:#0a5c2b;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:#1c7c3a;
display:block;
margin:auto;
border:4px solid white;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:10px;
text-align:left;
}

button{
padding:8px 14px;
margin-top:6px;
font-size:16px;
cursor:pointer;
}

</style>
</head>

<body>

<div id="ui">

<div>💰所持金: <span id="money">1000</span></div>

<div>🐎自分の馬</div>
スピード <span id="speed">5</span><br>
スタミナ <span id="stamina">5</span><br>

<button onclick="train()">育成</button>
<br><br>

<div>🎲オッズ</div>
<div id="odds"></div>

<button onclick="startRace()">レース開始</button>

</div>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas = document.getElementById("game")
const ctx = canvas.getContext("2d")

let money=1000

let playerHorse={
speed:5,
stamina:5,
lap:0,
progress:0
}

let horses=[]

function createHorses(){

horses=[]

for(let i=0;i<6;i++){

horses.push({

speed:4+Math.random()*3,
stamina:4+Math.random()*3,
progress:0,
lap:0,
color:"hsl("+Math.random()*360+",70%,50%)",
player:false

})

}

playerHorse.progress=0
playerHorse.lap=0

horses.push({
...playerHorse,
color:"gold",
player:true
})

}

createHorses()

function train(){

if(money>=100){

money-=100

playerHorse.speed+=0.5
playerHorse.stamina+=0.5

}

updateUI()

}

function updateUI(){

document.getElementById("money").innerText=Math.floor(money)
document.getElementById("speed").innerText=playerHorse.speed.toFixed(1)
document.getElementById("stamina").innerText=playerHorse.stamina.toFixed(1)

}

updateUI()

let race=false

function startRace(){

createHorses()
race=true

generateOdds()

}

function generateOdds(){

let html=""

horses.forEach((h,i)=>{

let o=(10/(h.speed+h.stamina)).toFixed(2)

html+="馬"+(i+1)+" : "+o+"倍<br>"

})

document.getElementById("odds").innerHTML=html

}

function drawTrack(){

let cx=450
let cy=250

ctx.lineWidth=50
ctx.strokeStyle="#8B4513"

ctx.beginPath()
ctx.ellipse(cx,cy,320,160,0,0,Math.PI*2)
ctx.stroke()

ctx.lineWidth=4
ctx.strokeStyle="white"

ctx.beginPath()
ctx.ellipse(cx,cy,320,160,0,0,Math.PI*2)
ctx.stroke()

}

function drawHorse(x,y,color){

ctx.fillStyle=color

// body
ctx.fillRect(x-12,y-6,24,12)

// head
ctx.fillRect(x+12,y-4,8,8)

// legs
ctx.fillRect(x-10,y+6,3,8)
ctx.fillRect(x-2,y+6,3,8)
ctx.fillRect(x+6,y+6,3,8)

}

function update(){

if(!race)return

horses.forEach(h=>{

let speed=(h.speed*0.002)+(Math.random()*0.002)

h.progress+=speed

if(h.progress>=1){

h.progress=0
h.lap++

if(h.lap>=3){

race=false
finishRace(h)

}

}

})

}

function finishRace(winner){

if(winner.player){

money+=500

}

else{

money-=200

}

horses.forEach(h=>{

if(!h.player){

h.speed+=Math.random()*0.3
h.stamina+=Math.random()*0.3

}

})

updateUI()

}

function draw(){

ctx.clearRect(0,0,900,500)

drawTrack()

let cx=450
let cy=250

horses.forEach((h,i)=>{

let angle=h.progress*2*Math.PI

let x=cx+Math.cos(angle)*320
let y=cy+Math.sin(angle)*160

drawHorse(x,y,h.color)

})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

loop()

</script>

</body>
</html>
