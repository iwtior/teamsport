<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬ゲーム</title>

<style>

body{
margin:0;
background:#0a5c2b;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:#1c7c3a;
display:block;
margin:auto;
border:4px solid white;
}

.screen{
display:none;
}

#betScreen{
display:block;
padding:20px;
}

#raceScreen{
position:relative;
}

#rank{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:10px;
}

button,input,select{
margin-top:6px;
padding:6px;
}

</style>

</head>

<body>

<!-- ベット画面 -->
<div id="betScreen" class="screen">

<h2>🐎 ベット画面</h2>

💰所持金: <span id="money">1000</span>

<br><br>

🌧馬場状態: <span id="trackState"></span>

<br><br>

賭ける馬  
<select id="betHorse"></select>

<br>

賭け金  
<input id="betMoney" type="number" value="100">

<div id="odds"></div>

<button onclick="startRace()">レース開始</button>

</div>


<!-- レース画面 -->
<div id="raceScreen" class="screen">

<canvas id="game" width="900" height="500"></canvas>

<div id="rank">
順位
<div id="rankList"></div>
</div>

</div>


<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let money=1000
let horses=[]
let race=false

const colors=["red","blue","yellow","purple","orange","cyan"]
const traits=["逃げ","先行","差し","追込"]
const trackStates=["良","稍重","重","不良"]

let trackCondition="良"

function showBetScreen(){

document.getElementById("betScreen").style.display="block"
document.getElementById("raceScreen").style.display="none"

}

function showRaceScreen(){

document.getElementById("betScreen").style.display="none"
document.getElementById("raceScreen").style.display="block"

}

function createHorses(){

horses=[]

trackCondition=trackStates[Math.floor(Math.random()*4)]

document.getElementById("trackState").innerText=trackCondition

for(let i=0;i<6;i++){

let speed=3+Math.random()*1.5
let stamina=3+Math.random()*3
let trait=traits[Math.floor(Math.random()*4)]

horses.push({

baseSpeed:speed,
stamina:stamina,
trait:trait,
progress:0,
color:colors[i],
odd:1

})

}

setupBetUI()

}

function setupBetUI(){

let select=document.getElementById("betHorse")
select.innerHTML=""

let oddsHTML=""

horses.forEach((h,i)=>{

let odd=(20/(h.baseSpeed+h.stamina)).toFixed(2)
h.odd=odd

let option=document.createElement("option")
option.value=i
option.text="馬"+(i+1)

select.appendChild(option)

oddsHTML+=`
馬${i+1} (${h.color})  
特性:${h.trait}  
スタミナ:${h.stamina.toFixed(1)}  
オッズ:${odd}倍<br>
`

})

document.getElementById("odds").innerHTML=oddsHTML

}

function startRace(){

let bet=parseInt(document.getElementById("betMoney").value)

if(bet>money){

alert("お金が足りません")
return

}

showRaceScreen()

race=true

}

function finishRace(winnerIndex){

race=false

let betHorse=parseInt(document.getElementById("betHorse").value)
let betMoney=parseInt(document.getElementById("betMoney").value)

money-=betMoney

if(betHorse===winnerIndex){

let win=Math.floor(betMoney*horses[winnerIndex].odd)

money+=win

alert("🎉的中！ "+win+"円")

}else{

alert("ハズレ")

}

document.getElementById("money").innerText=money

createHorses()

showBetScreen()

}

function getSpeed(h){

let p=h.progress
let speed=h.baseSpeed

if(h.trait==="逃げ" && p>0.6) speed*=0.7
if(h.trait==="差し" && p>0.6) speed*=1.4
if(h.trait==="追込" && p>0.75) speed*=1.8

if(p>0.7) speed*=h.stamina/5

if(trackCondition==="稍重") speed*=0.9
if(trackCondition==="重") speed*=0.8
if(trackCondition==="不良") speed*=0.7

return speed

}

function update(){

if(!race)return

horses.forEach((h,i)=>{

let speed=(getSpeed(h)*0.0003)+(Math.random()*0.00015)

h.progress+=speed

if(h.progress>=1){

finishRace(i)

}

})

updateRank()

}

function updateRank(){

let sorted=[...horses].sort((a,b)=>b.progress-a.progress)

let html=""

sorted.forEach((h,i)=>{

let num=horses.indexOf(h)+1

html+=`${i+1}位 : 馬${num}<br>`

})

document.getElementById("rankList").innerHTML=html

}

function drawTrack(){

ctx.lineWidth=50
ctx.strokeStyle="#8B4513"

ctx.beginPath()
ctx.ellipse(450,250,320,160,0,0,Math.PI*2)
ctx.stroke()

ctx.lineWidth=3
ctx.strokeStyle="white"

ctx.beginPath()
ctx.ellipse(450,250,320,160,0,0,Math.PI*2)
ctx.stroke()

}

function drawHorse(x,y,color){

ctx.fillStyle=color

ctx.fillRect(x-10,y-6,20,12)
ctx.fillRect(x+10,y-4,8,8)

ctx.fillRect(x-8,y+6,3,8)
ctx.fillRect(x,y+6,3,8)
ctx.fillRect(x+6,y+6,3,8)

}

function draw(){

ctx.clearRect(0,0,900,500)

drawTrack()

horses.forEach((h,i)=>{

let angle=h.progress*2*Math.PI

let x=450+Math.cos(angle)*320
let y=250+Math.sin(angle)*160

drawHorse(x,y,h.color)

ctx.fillStyle="white"
ctx.fillText(i+1,x-4,y-12)

})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

createHorses()
showBetScreen()
loop()

</script>

</body>
</html>
