<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬ゲーム</title>

<style>

body{
margin:0;
background:#2e8b57;
font-family:sans-serif;
color:white;
text-align:center;
}

#ui{
background:#222;
padding:10px;
}

.track{
position:relative;
margin:30px auto;
width:90%;
height:240px;
background:#c19a6b;
border-radius:120px;
}

.goal{
position:absolute;
right:40px;
top:0;
width:6px;
height:100%;
background:white;
}

.horse{
position:absolute;
width:70px;
height:40px;
}

.body{
width:45px;
height:22px;
background:brown;
border-radius:10px;
position:absolute;
top:10px;
}

.head{
width:18px;
height:18px;
background:brown;
border-radius:50%;
position:absolute;
left:40px;
top:4px;
}

.ear{
width:6px;
height:6px;
background:brown;
position:absolute;
left:52px;
top:0;
}

.leg{
width:4px;
height:14px;
background:black;
position:absolute;
bottom:0;
}

.l1{left:5px}
.l2{left:18px}
.l3{left:30px}
.l4{left:42px}

#horse0{top:20px;}
#horse1{top:70px;}
#horse2{top:120px;}
#horse3{top:170px;}

button,input,select{
font-size:16px;
margin:4px;
}

</style>
</head>

<body>

<div id="ui">

💰 所持金: <span id="money">1000</span>

<br>

🐎 自分の馬（1番）  
スピード: <span id="speed">5</span>  
スタミナ: <span id="stamina">5</span>

<br>

<button onclick="trainSpeed()">スピード育成</button>
<button onclick="trainStamina()">スタミナ育成</button>

<br><br>

賭ける馬
<select id="betHorse">
<option value="0">1番（自分の馬）</option>
<option value="1">2番</option>
<option value="2">3番</option>
<option value="3">4番</option>
</select>

賭け金
<input id="betMoney" type="number" value="100">

<button onclick="startRace()">レース開始</button>

<div id="odds"></div>
<div id="result"></div>

</div>

<div class="track">

<div class="goal"></div>

<div id="horse0" class="horse"></div>
<div id="horse1" class="horse"></div>
<div id="horse2" class="horse"></div>
<div id="horse3" class="horse"></div>

</div>

<script>

function createHorse(id){

let h=document.getElementById(id)

h.innerHTML=`
<div class="body"></div>
<div class="head"></div>
<div class="ear"></div>
<div class="leg l1"></div>
<div class="leg l2"></div>
<div class="leg l3"></div>
<div class="leg l4"></div>
`

}

createHorse("horse0")
createHorse("horse1")
createHorse("horse2")
createHorse("horse3")

let money=1000

let speed=5
let stamina=5

let horses=[
{el:horse0,pos:0,speed:0},
{el:horse1,pos:0,speed:0},
{el:horse2,pos:0,speed:0},
{el:horse3,pos:0,speed:0}
]

let odds=[]

function updateUI(){

document.getElementById("money").textContent=money
document.getElementById("speed").textContent=speed
document.getElementById("stamina").textContent=stamina

}

function trainSpeed(){

if(money>=100){
money-=100
speed++
updateUI()
}

}

function trainStamina(){

if(money>=100){
money-=100
stamina++
updateUI()
}

}

function createOdds(){

odds=[]

let html="📊オッズ<br>"

for(let i=0;i<4;i++){

let o=(2+Math.random()*4).toFixed(1)
odds.push(o)

html+=(i+1)+"番 "+o+"倍<br>"

}

document.getElementById("odds").innerHTML=html

}

function startRace(){

let betHorse=parseInt(document.getElementById("betHorse").value)
let bet=parseInt(document.getElementById("betMoney").value)

if(bet>money){
alert("お金が足りない")
return
}

money-=bet

horses.forEach((h,i)=>{

h.pos=0

if(i===0){
h.speed=1+speed*0.15
}else{
h.speed=1+Math.random()*2
}

})

let finish=false

function race(){

horses.forEach((h,i)=>{

h.pos+=h.speed

h.el.style.left=h.pos+"px"

if(h.pos>window.innerWidth-200 && !finish){

finish=true

if(i===betHorse){

let win=Math.floor(bet*odds[i])
money+=win

result.textContent="🎉 的中 "+win+"円"

}else{

result.textContent="ハズレ 勝ったのは"+(i+1)+"番"

}

updateUI()

setTimeout(()=>{

result.textContent=""
createOdds()

},2000)

}

})

if(!finish){
requestAnimationFrame(race)
}

}

race()

}

createOdds()
updateUI()

</script>

</body>
</html>
