<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬育成ゲーム</title>

<style>

body{
margin:0;
background:#2b8a3e;
font-family:sans-serif;
color:white;
text-align:center;
}

.track{
position:absolute;
top:260px;
left:50px;
width:90%;
height:200px;
background:#b8860b;
border-radius:100px;
}

.goal{
position:absolute;
right:20px;
top:240px;
width:10px;
height:260px;
background:white;
}

.horse{
position:absolute;
width:60px;
height:30px;
border-radius:10px;
}

#horse0{background:red;top:280px;}
#horse1{background:blue;top:320px;}
#horse2{background:yellow;top:360px;}
#horse3{background:white;top:400px;}

button,input,select{
font-size:18px;
}

#ui{
margin-top:20px;
}

</style>
</head>

<body>

<div id="ui">

💰 所持金: <span id="money">1000</span>

<br><br>

🐎 自分の馬  
スピード: <span id="speedStat">5</span>  
スタミナ: <span id="staminaStat">5</span>

<br><br>

賭ける馬:
<select id="betHorse"></select>

賭け金:
<input id="betMoney" type="number" value="100">

<button id="start">レース開始</button>

<button onclick="trainSpeed()">スピード育成</button>
<button onclick="trainStamina()">スタミナ育成</button>

<div id="odds"></div>
<div id="result"></div>

</div>

<div class="track"></div>
<div class="goal"></div>

<div id="horse0" class="horse"></div>
<div id="horse1" class="horse"></div>
<div id="horse2" class="horse"></div>
<div id="horse3" class="horse"></div>

<script>

let money=1000

let horses=[
{el:horse0,pos:0,speed:1,stamina:5},
{el:horse1,pos:0,speed:1,stamina:5},
{el:horse2,pos:0,speed:1,stamina:5},
{el:horse3,pos:0,speed:1,stamina:5}
]

let playerHorse=0

let speedStat=5
let staminaStat=5

function updateStats(){

speedStat=Math.min(speedStat,20)
staminaStat=Math.min(staminaStat,20)

document.getElementById("speedStat").textContent=speedStat
document.getElementById("staminaStat").textContent=staminaStat

}

function trainSpeed(){

if(money>=100){
money-=100
speedStat++
updateMoney()
updateStats()
}

}

function trainStamina(){

if(money>=100){
money-=100
staminaStat++
updateMoney()
updateStats()
}

}

function updateMoney(){
document.getElementById("money").textContent=money
}

function setupRace(){

horses.forEach((h,i)=>{

h.pos=0

if(i===playerHorse){
h.speed=0.8+speedStat*0.1
h.stamina=staminaStat
}else{
h.speed=0.8+Math.random()*2
h.stamina=5+Math.random()*10
}

h.odds=(3+(Math.random()*4)).toFixed(1)

})

updateOdds()

}

function updateOdds(){

let oddsHTML="📊 オッズ<br>"

horses.forEach((h,i)=>{
oddsHTML+=(i+1)+"番 : "+h.odds+"倍<br>"
})

document.getElementById("odds").innerHTML=oddsHTML

let select=document.getElementById("betHorse")

select.innerHTML=""

horses.forEach((h,i)=>{

let op=document.createElement("option")
op.value=i
op.textContent=(i+1)+"番"

select.appendChild(op)

})

}

document.getElementById("start").onclick=()=>{

setupRace()

let betHorse=parseInt(betHorse.value)
let bet=parseInt(betMoney.value)

if(bet>money){
alert("お金が足りない")
return
}

money-=bet
updateMoney()

let finish=false

function update(){

horses.forEach((h,i)=>{

let fatigue=Math.max(0.3,1-(h.pos/800)/h.stamina)

h.pos+=h.speed*fatigue

h.el.style.left=h.pos+"px"

if(h.pos>window.innerWidth-120 && !finish){

finish=true

if(i===betHorse){

let win=Math.floor(bet*h.odds)

money+=win

result.textContent="🎉 的中！ "+win+"円"

}else{

result.textContent="ハズレ！ 勝ったのは "+(i+1)+"番"

}

updateMoney()

}

})

if(!finish) requestAnimationFrame(update)

}

update()

}

updateStats()

</script>

</body>
</html>
