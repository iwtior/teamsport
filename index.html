<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬ゲーム</title>

<style>

body{
margin:0;
background:#0a5c2b;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:#1c7c3a;
display:block;
margin:auto;
border:4px solid white;
}

.screen{display:none;}

#betScreen{
display:block;
padding:20px;
}

#raceScreen{
position:relative;
}

#rank{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:10px;
}

select,input,button{
margin-top:6px;
padding:6px;
}

</style>
</head>

<body>

<div id="betScreen">

<h2>🐎 ベット画面</h2>

💰所持金: <span id="money">1000</span><br>

券種
<select id="betType" onchange="updateBetUI()">
<option value="win">単勝</option>
<option value="trio">三連複</option>
<option value="trifecta">三連単</option>
</select>

<div id="horseSelect">

馬1
<select id="horse1"></select>

<div id="horse2div">
馬2
<select id="horse2"></select>
</div>

<div id="horse3div">
馬3
<select id="horse3"></select>
</div>

</div>

賭け金
<input id="betMoney" type="number" value="100">

<div id="odds"></div>

<button onclick="startRace()">レース開始</button>

</div>

<div id="raceScreen">

<canvas id="game" width="900" height="500"></canvas>

<div id="rank">
順位
<div id="rankList"></div>
</div>

</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let money=1000
let horses=[]
let race=false
let finishOrder=[]

const colors=["red","blue","yellow","purple","orange","cyan"]

function showBet(){

betScreen.style.display="block"
raceScreen.style.display="none"

}

function showRace(){

betScreen.style.display="none"
raceScreen.style.display="block"

}

function createHorses(){

horses=[]

for(let i=0;i<6;i++){

let speed=3+Math.random()*2
let stamina=3+Math.random()*3
let sprint=3+Math.random()*3

horses.push({

speed:speed,
stamina:stamina,
sprint:sprint,
progress:0,
color:colors[i]

})

}

setupUI()

}

function setupUI(){

let selects=["horse1","horse2","horse3"]

selects.forEach(id=>{

let s=document.getElementById(id)
s.innerHTML=""

horses.forEach((h,i)=>{

let o=document.createElement("option")
o.value=i
o.text="馬"+(i+1)

s.appendChild(o)

})

})

let oddsHTML=""

horses.forEach((h,i)=>{

let power=h.speed+h.stamina+h.sprint
let odd=(30/power).toFixed(2)

oddsHTML+=`
馬${i+1} (${h.color})<br>
Speed:${h.speed.toFixed(1)}
Stamina:${h.stamina.toFixed(1)}
Sprint:${h.sprint.toFixed(1)}
オッズ:${odd}倍
<hr>
`

})

odds.innerHTML=oddsHTML

updateBetUI()

}

function updateBetUI(){

let type=betType.value

if(type==="win"){

horse2div.style.display="none"
horse3div.style.display="none"

}else{

horse2div.style.display="block"
horse3div.style.display="block"

}

}

function startRace(){

let bet=parseInt(betMoney.value)

if(bet>money){

alert("お金不足")
return

}

finishOrder=[]

showRace()
race=true

}

function finishRace(index){

finishOrder.push(index)

if(finishOrder.length===3){

race=false
checkBet()

}

}

function checkBet(){

let type=betType.value

let h1=parseInt(horse1.value)
let h2=parseInt(horse2.value)
let h3=parseInt(horse3.value)

let bet=parseInt(betMoney.value)

money-=bet

let win=false

if(type==="win"){

if(finishOrder[0]===h1) win=true

}

if(type==="trio"){

let betSet=[h1,h2,h3].sort()
let result=[finishOrder[0],finishOrder[1],finishOrder[2]].sort()

win=JSON.stringify(betSet)===JSON.stringify(result)

}

if(type==="trifecta"){

win=
finishOrder[0]===h1 &&
finishOrder[1]===h2 &&
finishOrder[2]===h3

}

if(win){

let payout=bet*5
money+=payout
alert("🎉的中 "+payout+"円")

}else{

alert("ハズレ")

}

moneyDisplay.innerText=money

createHorses()

showBet()

}

function getSpeed(h){

let p=h.progress

let speed=h.speed

if(p>0.7){

speed+=h.sprint

}

if(p>0.6){

speed*=h.stamina/5

}

return speed

}

function update(){

if(!race)return

horses.forEach((h,i)=>{

let speed=(getSpeed(h)*0.0003)+(Math.random()*0.00015)

h.progress+=speed

if(h.progress>=1 && !finishOrder.includes(i)){

finishRace(i)

}

})

updateRank()

}

function updateRank(){

let sorted=[...horses].sort((a,b)=>b.progress-a.progress)

let html=""

sorted.forEach((h,i)=>{

let num=horses.indexOf(h)+1

html+=`${i+1}位:馬${num}<br>`

})

rankList.innerHTML=html

}

function drawTrack(){

ctx.lineWidth=50
ctx.strokeStyle="#8B4513"

ctx.beginPath()
ctx.ellipse(450,250,320,160,0,0,Math.PI*2)
ctx.stroke()

ctx.lineWidth=3
ctx.strokeStyle="white"

ctx.beginPath()
ctx.ellipse(450,250,320,160,0,0,Math.PI*2)
ctx.stroke()

}

function drawHorse(x,y,color){

ctx.fillStyle=color

ctx.fillRect(x-10,y-6,20,12)
ctx.fillRect(x+10,y-4,8,8)

ctx.fillRect(x-8,y+6,3,8)
ctx.fillRect(x,y+6,3,8)
ctx.fillRect(x+6,y+6,3,8)

}

function draw(){

ctx.clearRect(0,0,900,500)

drawTrack()

horses.forEach((h,i)=>{

let angle=h.progress*2*Math.PI

let x=450+Math.cos(angle)*320
let y=250+Math.sin(angle)*160

drawHorse(x,y,h.color)

ctx.fillStyle="white"
ctx.fillText(i+1,x-4,y-12)

})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

createHorses()
showBet()
loop()

</script>

</body>
</html>
