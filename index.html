<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>3D 野球ゲーム</title>

<style>

body{
margin:0;
overflow:hidden;
background:#87ceeb;
font-family:sans-serif;
}

#ui{
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.5);
padding:10px;
border-radius:10px;
}

button{
padding:10px 20px;
font-size:16px;
margin-top:5px;
}

</style>
</head>

<body>

<div id="ui">
⚾ 3D野球デモ<br>
<button onclick="swing()">スイング</button><br>
<span id="result">投球待ち</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>

const scene = new THREE.Scene()

const camera = new THREE.PerspectiveCamera(
60,
window.innerWidth/window.innerHeight,
0.1,
1000
)

camera.position.set(0,3,8)

const renderer = new THREE.WebGLRenderer()
renderer.setSize(window.innerWidth,window.innerHeight)
document.body.appendChild(renderer.domElement)

const light = new THREE.DirectionalLight(0xffffff,1)
light.position.set(5,10,5)
scene.add(light)

const ambient = new THREE.AmbientLight(0xffffff,0.6)
scene.add(ambient)

/* 地面 */

const groundGeo = new THREE.PlaneGeometry(20,20)
const groundMat = new THREE.MeshPhongMaterial({color:0x2e8b57})
const ground = new THREE.Mesh(groundGeo,groundMat)

ground.rotation.x = -Math.PI/2
scene.add(ground)

/* ボール */

const ballGeo = new THREE.SphereGeometry(0.2,32,32)
const ballMat = new THREE.MeshPhongMaterial({color:0xffffff})

const ball = new THREE.Mesh(ballGeo,ballMat)
ball.position.set(0,1,-8)

scene.add(ball)

/* バッター（簡易3Dモデル） */

const bodyGeo = new THREE.BoxGeometry(0.6,1.5,0.4)
const bodyMat = new THREE.MeshPhongMaterial({color:0x0000ff})

const batterBody = new THREE.Mesh(bodyGeo,bodyMat)
batterBody.position.set(0,0.8,0)

scene.add(batterBody)

/* 頭 */

const headGeo = new THREE.SphereGeometry(0.3,32,32)
const headMat = new THREE.MeshPhongMaterial({color:0xffcc99})

const head = new THREE.Mesh(headGeo,headMat)
head.position.set(0,1.8,0)

scene.add(head)

/* バット */

const batGeo = new THREE.CylinderGeometry(0.05,0.05,1.5)
const batMat = new THREE.MeshPhongMaterial({color:0x8b4513})

const bat = new THREE.Mesh(batGeo,batMat)
bat.rotation.z = Math.PI/2
bat.position.set(0.8,1.2,0)

scene.add(bat)

/* 投球 */

let pitching = true

function pitch(){

ball.position.set(0,1,-8)
pitching=true

}

setInterval(pitch,3000)

/* スイング */

function swing(){

bat.rotation.z = Math.PI/2 + 0.8

setTimeout(()=>{
bat.rotation.z = Math.PI/2
},200)

let dist = ball.position.distanceTo(batterBody.position)

if(dist < 1){

document.getElementById("result").innerText="ヒット！"

}

else{

document.getElementById("result").innerText="空振り"

}

}

/* アニメーション */

function animate(){

requestAnimationFrame(animate)

if(pitching){

ball.position.z += 0.15

/* ボール回転 */

ball.rotation.x += 0.3
ball.rotation.y += 0.2

if(ball.position.z > 1){

pitching=false

}

}

renderer.render(scene,camera)

}

animate()

</script>

</body>
</html>
