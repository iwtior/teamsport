<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬ゲーム</title>

<style>

body{
margin:0;
background:#0a5c2b;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:#1c7c3a;
display:block;
margin:auto;
border:4px solid white;
}

#ui{
position:absolute;
top:10px;
left:10px;
background:rgba(0,0,0,0.7);
padding:12px;
border-radius:10px;
width:230px;
text-align:left;
}

button{
padding:8px;
margin-top:6px;
width:100%;
}

select,input{
width:100%;
margin-top:4px;
}

</style>
</head>

<body>

<div id="ui">

<div>💰所持金: <span id="money">1000</span></div>

<hr>

🐎賭ける馬
<select id="betHorse"></select>

💰賭け金
<input id="betMoney" type="number" value="100">

<div id="odds"></div>

<button onclick="startRace()">レース開始</button>

<hr>

自分の馬<br>
Speed <span id="speed">5</span><br>
Stamina <span id="stamina">5</span>

<button onclick="train()">育成(100)</button>

</div>

<canvas id="game" width="900" height="500"></canvas>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let money=1000

let playerHorse={speed:5,stamina:5}

let horses=[]
let race=false

const horseColors=[
"red","blue","yellow","purple","orange","gold"
]

function createHorses(){

horses=[]

for(let i=0;i<6;i++){

let h={

speed:4+Math.random()*2,
stamina:4+Math.random()*2,
progress:0,
lap:0,
color:horseColors[i],
odd:1

}

if(i===5){

h.speed=playerHorse.speed
h.stamina=playerHorse.stamina
h.player=true

}

horses.push(h)

}

setupBetUI()

}

function setupBetUI(){

let select=document.getElementById("betHorse")
select.innerHTML=""

let oddsHTML=""

horses.forEach((h,i)=>{

let odd=(12/(h.speed+h.stamina)).toFixed(2)
h.odd=odd

let option=document.createElement("option")
option.value=i
option.text="馬"+(i+1)+" ("+h.color+")"

select.appendChild(option)

oddsHTML+=`<div>馬${i+1} (${h.color}) : ${odd}倍</div>`

})

document.getElementById("odds").innerHTML=oddsHTML

}

function train(){

if(money>=100){

money-=100
playerHorse.speed+=0.3
playerHorse.stamina+=0.3

}

updateUI()

}

function updateUI(){

money=Math.floor(money)

document.getElementById("money").innerText=money
document.getElementById("speed").innerText=playerHorse.speed.toFixed(1)
document.getElementById("stamina").innerText=playerHorse.stamina.toFixed(1)

}

function startRace(){

createHorses()
race=true

}

function drawTrack(){

ctx.lineWidth=50
ctx.strokeStyle="#8B4513"

ctx.beginPath()
ctx.ellipse(450,250,320,160,0,0,Math.PI*2)
ctx.stroke()

ctx.lineWidth=4
ctx.strokeStyle="white"

ctx.beginPath()
ctx.ellipse(450,250,320,160,0,0,Math.PI*2)
ctx.stroke()

}

function drawHorse(x,y,color){

ctx.fillStyle=color

ctx.fillRect(x-10,y-6,20,12)
ctx.fillRect(x+10,y-4,8,8)

ctx.fillRect(x-8,y+6,3,8)
ctx.fillRect(x,y+6,3,8)
ctx.fillRect(x+6,y+6,3,8)

}

function update(){

if(!race)return

horses.forEach(h=>{

let speed=(h.speed*0.0006)+(Math.random()*0.0004)

h.progress+=speed

if(h.progress>=1){

h.progress=0
h.lap++

if(h.lap>=3){

race=false
finishRace(h)

}

}

})

}

function finishRace(winner){

let betHorse=parseInt(document.getElementById("betHorse").value)
let betMoney=parseInt(document.getElementById("betMoney").value)

if(betHorse===horses.indexOf(winner)){

let win=Math.floor(betMoney*winner.odd)

money+=win

alert("🎉的中！ "+win+"円")

}else{

money-=betMoney

alert("残念ハズレ")

}

horses.forEach(h=>{

if(!h.player){

h.speed+=Math.random()*0.2
h.stamina+=Math.random()*0.2

}

})

updateUI()

}

function draw(){

ctx.clearRect(0,0,900,500)

drawTrack()

horses.forEach((h,i)=>{

let angle=h.progress*2*Math.PI

let x=450+Math.cos(angle)*320
let y=250+Math.sin(angle)*160

drawHorse(x,y,h.color)

ctx.fillStyle="white"
ctx.fillText(i+1,x-4,y-12)

})

}

function loop(){

update()
draw()

requestAnimationFrame(loop)

}

createHorses()
updateUI()
loop()

</script>

</body>
</html>
