<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬ゲーム 完全版</title>

<style>
body{
margin:0;
background:#0a5c2b;
color:white;
font-family:sans-serif;
text-align:center;
}

canvas{
background:linear-gradient(#2e8b57,#1c7c3a);
display:block;
margin:auto;
border:4px solid white;
}

.screen{display:none;padding:20px;}
#betScreen{display:block;}
#raceScreen{position:relative;}

#rank{
position:absolute;
top:10px;
right:10px;
background:rgba(0,0,0,0.7);
padding:10px;
border-radius:10px;
}

.flex{
display:flex;
justify-content:space-around;
margin-top:20px;
}

.box{width:40%;}

#odds,#horseStats{
height:260px;
overflow-y:auto;
border:1px solid white;
padding:10px;
}

button,input,select{margin-top:6px;padding:6px;}
</style>
</head>

<body>

<div id="betScreen" class="screen">

<h2>🐎 ベット画面</h2>

💰所持金: <span id="moneyDisplay">2000</span><br>

券種
<select id="betType" onchange="updateBetUI()">
<option value="win">単勝</option>
<option value="trio">三連複</option>
<option value="trifecta">三連単</option>
</select>

<br>

馬1 <select id="horse1"></select>
<div id="horse2div">馬2 <select id="horse2"></select></div>
<div id="horse3div">馬3 <select id="horse3"></select></div>

<br>

賭け金 <input id="betMoney" type="number" value="100">

<div class="flex">

<div class="box">
<h3>🐎 馬能力</h3>
<div id="horseStats"></div>
</div>

<div class="box">
<h3>📊 オッズ表</h3>
<div id="odds"></div>
</div>

</div>

<br>
<button onclick="startRace()">レース開始</button>

</div>

<div id="raceScreen" class="screen">
<canvas id="game" width="900" height="500"></canvas>

<div id="rank">
順位
<div id="rankList"></div>
</div>
</div>

<div id="resultScreen" class="screen">
<h2>🏁 レース結果</h2>
<div id="resultTable"></div>
<br>
<div id="payout"></div>
<br>
<button onclick="nextRace()">次のレース</button>
</div>

<script>

const canvas=document.getElementById("game")
const ctx=canvas.getContext("2d")

let money=2000
let horses=[]
let race=false
let finishOrder=[]
let frame=0

const colors=["red","blue","yellow","purple","orange","cyan"]

function showScreen(name){
betScreen.style.display="none"
raceScreen.style.display="none"
resultScreen.style.display="none"
document.getElementById(name).style.display="block"
}

function createHorses(){

horses=[]

for(let i=0;i<6;i++){

let speed=3+Math.random()*2
let stamina=3+Math.random()*3
let sprint=3+Math.random()*3

let traits=["逃げ","先行","差し","追込"]
let trait=traits[Math.floor(Math.random()*4)]

let power=speed+stamina+sprint
let odd=(20/power).toFixed(2)

horses.push({
speed,stamina,sprint,
progress:0,
color:colors[i],
odd:odd,
trait:trait
})

}

setupUI()
}

function setupUI(){

["horse1","horse2","horse3"].forEach(id=>{
let s=document.getElementById(id)
s.innerHTML=""
horses.forEach((h,i)=>{
let o=document.createElement("option")
o.value=i
o.text="馬"+(i+1)
s.appendChild(o)
})
})

updateHorseStats()
updateOddsTable()
moneyDisplay.innerText=money
updateBetUI()
}

function updateHorseStats(){

let html=""
horses.forEach((h,i)=>{
html+=`
馬${i+1} (${h.color})<br>
特性: ${h.trait}<br>
Speed: ${h.speed.toFixed(1)}<br>
Stamina: ${h.stamina.toFixed(1)}<br>
Sprint: ${h.sprint.toFixed(1)}<br>
単勝: ${h.odd}倍<hr>`
})

horseStats.innerHTML=html
}

function updateBetUI(){

let type=betType.value
horse2div.style.display=(type==="win")?"none":"block"
horse3div.style.display=(type==="win")?"none":"block"

updateOddsTable()
}

function updateOddsTable(){

let type=betType.value
let html=""

if(type==="win"){
horses.forEach((h,i)=>{
html+=`馬${i+1} : ${h.odd}倍<br>`
})
}

if(type==="trio"){
html+="三連複<br><hr>"
for(let i=0;i<6;i++){
for(let j=i+1;j<6;j++){
for(let k=j+1;k<6;k++){

let avg=(horses[i].odd*1+horses[j].odd*1+horses[k].odd*1)/3
let odd=((avg*8)+Math.pow(avg,1.2)).toFixed(1)

html+=`${i+1}-${j+1}-${k+1} : ${odd}倍<br>`
}}}
}

if(type==="trifecta"){
html+="三連単<br><hr>"
for(let i=0;i<6;i++){
for(let j=0;j<6;j++){
for(let k=0;k<6;k++){
if(i!==j&&j!==k&&i!==k){

let avg=(horses[i].odd*1+horses[j].odd*1+horses[k].odd*1)/3
let odd=((avg*18)+Math.pow(avg,1.5)).toFixed(1)

html+=`${i+1}→${j+1}→${k+1} : ${odd}倍<br>`
}}}}
}

odds.innerHTML=html
}

function getSpeed(h){

let p=h.progress
let speed=h.speed

if(h.trait==="逃げ"){
if(p<0.3) speed+=1.5
if(p>0.7) speed-=0.5
}

if(h.trait==="先行"){
if(p<0.6) speed+=0.8
}

if(h.trait==="差し"){
if(p>0.5) speed+=1.2
}

if(h.trait==="追込"){
if(p>0.7) speed+=2
}

return speed
}

function startRace(){

let bet=parseInt(betMoney.value)
if(bet>money){alert("お金不足");return}

finishOrder=[]
showScreen("raceScreen")
race=true
}

function finishRace(i){
finishOrder.push(i)
if(finishOrder.length===3){
race=false
showResult()
}
}

function showResult(){

resultTable.innerHTML=
`🥇1着 馬${finishOrder[0]+1}<br>
🥈2着 馬${finishOrder[1]+1}<br>
🥉3着 馬${finishOrder[2]+1}`

payout.innerHTML=checkBet()
showScreen("resultScreen")
}

function checkBet(){

let type=betType.value
let h1=+horse1.value
let h2=+horse2.value
let h3=+horse3.value
let bet=+betMoney.value

money-=bet
let win=false
let mult=0

if(type==="win"){
if(finishOrder[0]===h1){
win=true
mult=horses[h1].odd
}
}

if(type==="trio"){
let a=[h1,h2,h3].sort()
let b=[finishOrder[0],finishOrder[1],finishOrder[2]].sort()
if(JSON.stringify(a)==JSON.stringify(b)){
win=true
let avg=(horses[h1].odd*1+horses[h2].odd*1+horses[h3].odd*1)/3
mult=(avg*8)+Math.pow(avg,1.2)
}
}

if(type==="trifecta"){
if(finishOrder[0]===h1&&finishOrder[1]===h2&&finishOrder[2]===h3){
win=true
let avg=(horses[h1].odd*1+horses[h2].odd*1+horses[h3].odd*1)/3
mult=(avg*18)+Math.pow(avg,1.5)
}
}

if(win){
let pay=Math.floor(bet*mult)
money+=pay
moneyDisplay.innerText=money
return `🎉 的中！ ${pay}円（${mult.toFixed(1)}倍）`
}

moneyDisplay.innerText=money
return "ハズレ"
}

function nextRace(){
createHorses()
showScreen("betScreen")
}

function update(){

if(!race)return

horses.forEach((h,i)=>{

let speed=(getSpeed(h)*0.0003)+(Math.random()*0.00015)
h.progress+=speed

if(h.progress>=1&&!finishOrder.includes(i)){
finishRace(i)
}

})

updateRank()
}

function updateRank(){

let sorted=[...horses].sort((a,b)=>b.progress-a.progress)

let html=""
sorted.forEach((h,i)=>{
let num=horses.indexOf(h)+1
html+=`${i+1}位:馬${num}<br>`
})

rankList.innerHTML=html
}

function drawTrack(){

ctx.lineWidth=50
ctx.strokeStyle="#8B4513"
ctx.beginPath()
ctx.ellipse(450,250,320,160,0,0,Math.PI*2)
ctx.stroke()

ctx.lineWidth=3
ctx.strokeStyle="white"
ctx.beginPath()
ctx.ellipse(450,250,320,160,0,0,Math.PI*2)
ctx.stroke()
}

function drawHorse(x,y,color,angle,h){

ctx.save()
ctx.translate(x,y)
ctx.rotate(angle)

// 影
ctx.fillStyle="rgba(0,0,0,0.35)"
ctx.beginPath()
ctx.ellipse(0,12,16,5,0,0,Math.PI*2)
ctx.fill()

// グラデーション
let grad=ctx.createLinearGradient(-12,0,12,0)
grad.addColorStop(0,"black")
grad.addColorStop(0.5,color)
grad.addColorStop(1,"white")

ctx.fillStyle=grad

// 胴体
ctx.beginPath()
ctx.ellipse(0,0,13,7,0,0,Math.PI*2)
ctx.fill()

// 首
let neck=Math.sin(frame*0.2)*2
ctx.beginPath()
ctx.ellipse(10,-3+neck,5,4,0,0,Math.PI*2)
ctx.fill()

// 頭
ctx.beginPath()
ctx.ellipse(15,-5+neck,4,3,0,0,Math.PI*2)
ctx.fill()

// しっぽ
let tail=Math.sin(frame*0.3)*4
ctx.beginPath()
ctx.moveTo(-12,0)
ctx.lineTo(-18,tail)
ctx.lineTo(-14,2)
ctx.fill()

// 脚（速度で変化）
let sp=getSpeed(h)
let leg1=Math.sin(frame*0.4*sp)*6
let leg2=Math.sin(frame*0.4*sp+Math.PI)*6

ctx.strokeStyle=color
ctx.lineWidth=3

ctx.beginPath()
ctx.moveTo(5,6)
ctx.lineTo(5,12+leg1)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(2,6)
ctx.lineTo(2,12+leg2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(-3,6)
ctx.lineTo(-3,12+leg2)
ctx.stroke()

ctx.beginPath()
ctx.moveTo(-7,6)
ctx.lineTo(-7,12+leg1)
ctx.stroke()

ctx.restore()
}

function draw(){

ctx.clearRect(0,0,900,500)

drawTrack()

horses.forEach((h,i)=>{

let angle=h.progress*2*Math.PI

let x=450+Math.cos(angle)*320
let y=250+Math.sin(angle)*160

let dir=angle+Math.PI/2

// サイズ変化
let size=0.9 + h.speed*0.05

ctx.save()
ctx.scale(size,size)

drawHorse(x/size,y/size,h.color,dir,h)

ctx.restore()

ctx.fillStyle="white"
ctx.fillText(i+1,x-4,y-12)

})

frame++
}

function loop(){
update()
draw()
requestAnimationFrame(loop)
}

createHorses()
showScreen("betScreen")
loop()

</script>

</body>
</html>
