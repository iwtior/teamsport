<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>競馬ゲーム</title>

<style>

body{
margin:0;
background:#2e8b57;
font-family:sans-serif;
color:white;
text-align:center;
overflow:hidden;
}

#ui{
position:fixed;
top:0;
left:0;
width:100%;
background:rgba(0,0,0,0.7);
padding:10px;
z-index:10;
}

.track{
position:absolute;
top:200px;
left:50px;
width:90%;
height:220px;
background:#c19a6b;
border-radius:100px;
}

.goal{
position:absolute;
right:40px;
top:180px;
width:10px;
height:260px;
background:white;
}

.horse{
position:absolute;
width:80px;
height:40px;
}

.horse-body{
position:absolute;
width:60px;
height:25px;
background:brown;
border-radius:10px;
top:10px;
}

.horse-head{
position:absolute;
width:20px;
height:20px;
background:brown;
border-radius:50%;
left:55px;
top:5px;
}

.leg{
position:absolute;
width:5px;
height:15px;
background:black;
bottom:0;
}

.leg1{left:10px;}
.leg2{left:25px;}
.leg3{left:40px;}
.leg4{left:55px;}

#horse0{top:220px;}
#horse1{top:260px;}
#horse2{top:300px;}
#horse3{top:340px;}

button,input,select{
font-size:16px;
margin:3px;
}

</style>
</head>

<body>

<div id="ui">

💰 所持金: <span id="money">1000</span>

<br>

🐎 自分の馬  
スピード: <span id="speedStat">5</span>  
スタミナ: <span id="staminaStat">5</span>

<br>

<button onclick="trainSpeed()">スピード育成</button>
<button onclick="trainStamina()">スタミナ育成</button>

<br>

賭ける馬
<select id="betHorse"></select>

賭け金
<input id="betMoney" type="number" value="100">

<button id="start">レース開始</button>

<div id="odds"></div>
<div id="result"></div>

</div>

<div class="track"></div>
<div class="goal"></div>

<div id="horse0" class="horse"></div>
<div id="horse1" class="horse"></div>
<div id="horse2" class="horse"></div>
<div id="horse3" class="horse"></div>

<script>

let money=1000

function createHorse(id){

let horse=document.getElementById(id)

horse.innerHTML=`
<div class="horse-body"></div>
<div class="horse-head"></div>
<div class="leg leg1"></div>
<div class="leg leg2"></div>
<div class="leg leg3"></div>
<div class="leg leg4"></div>
`

}

createHorse("horse0")
createHorse("horse1")
createHorse("horse2")
createHorse("horse3")

let horses=[
{el:horse0,pos:0,speed:0,stamina:5,odds:1},
{el:horse1,pos:0,speed:0,stamina:5,odds:1},
{el:horse2,pos:0,speed:0,stamina:5,odds:1},
{el:horse3,pos:0,speed:0,stamina:5,odds:1}
]

let playerHorse=0

let speedStat=5
let staminaStat=5

function updateMoney(){
money=Math.floor(money)
document.getElementById("money").textContent=money
}

function updateStats(){

document.getElementById("speedStat").textContent=speedStat
document.getElementById("staminaStat").textContent=staminaStat

}

function trainSpeed(){

if(money>=100){
money-=100
speedStat++
updateMoney()
updateStats()
}

}

function trainStamina(){

if(money>=100){
money-=100
staminaStat++
updateMoney()
updateStats()
}

}

function setupRace(){

horses.forEach((h,i)=>{

h.pos=0

if(i===playerHorse){

h.speed=1+speedStat*0.2
h.stamina=staminaStat

}else{

h.speed=1+Math.random()*2
h.stamina=5+Math.random()*10

}

h.odds=(2+Math.random()*5).toFixed(1)

})

updateOdds()

}

function updateOdds(){

let oddsHTML="📊 オッズ<br>"

horses.forEach((h,i)=>{

oddsHTML+=(i+1)+"番 : "+h.odds+"倍<br>"

})

document.getElementById("odds").innerHTML=oddsHTML

let select=document.getElementById("betHorse")
select.innerHTML=""

horses.forEach((h,i)=>{

let op=document.createElement("option")
op.value=i
op.textContent=(i+1)+"番"

select.appendChild(op)

})

}

document.getElementById("start").onclick=()=>{

let betHorse=parseInt(betHorse.value)
let bet=parseInt(betMoney.value)

if(bet>money){
alert("お金が足りない")
return
}

money-=bet
updateMoney()

let finish=false

function race(){

horses.forEach((h,i)=>{

let fatigue=Math.max(0.3,1-(h.pos/800)/h.stamina)

h.pos+=h.speed*fatigue

h.el.style.left=h.pos+"px"

if(h.pos>window.innerWidth-150 && !finish){

finish=true

if(i===betHorse){

let win=Math.floor(bet*h.odds)
money+=win
result.textContent="🎉 的中！ "+win+"円"

}else{

result.textContent="ハズレ！ 勝ったのは "+(i+1)+"番"

}

updateMoney()

setTimeout(()=>{
result.textContent=""
setupRace()
},2000)

}

})

if(!finish) requestAnimationFrame(race)

}

race()

}

setupRace()
updateStats()

</script>

</body>
</html>
